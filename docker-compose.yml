version: '3.8'
services:

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: Lalit@2612
      MYSQL_DATABASE: resume_screening_db
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/resume_screening_db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend